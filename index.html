<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Note Card Stack</title>

    <link rel="stylesheet" href="style.css" />

</head>

<body>

    <!-- FORM MODAL -->

    <div class="form-container">

        <h2>New Call</h2>

        <form>

            <label>Image URL</label>
            <input required type="text" placeholder="https://example.com/photo.jpg" />

            <label>Full Name</label>
            <input required type="text" placeholder="Enter full name" />

            <label>Home Town</label>
            <input required type="text" placeholder="Enter home town" />

            <label>Purpose</label>
            <input required type="text" placeholder="e.g., Quick appointment note" />

            <label>Category</label>

            <label class="tag-checkbox">
                <input required type="radio" name="category" value="emergency" />
                <span>Emergency</span>
            </label>

            <label class="tag-checkbox">
                <input required type="radio" name="category" value="important" />
                <span>Important</span>
            </label>

            <label class="tag-checkbox">
                <input required type="radio" name="category" value="urgent" />
                <span>Urgent</span>
            </label>

            <label class="tag-checkbox">
                <input required type="radio" name="category" value="no-rush" />
                <span>No Rush</span>
            </label>

            <button type="submit" class="submit-btn">Create Note</button>

        </form>

        <button type="button" class="closeForm">Close</button>

    </div>


    <!-- MAIN NOTE AREA -->

    <div class="note-container">

        <div class="left-icons">

            <button id="add-note">
                <i class="ri-add-line"></i>
            </button>

            <button id="upBtn">
                <i class="ri-arrow-up-line"></i>
            </button>

            <button id="downBtn">
                <i class="ri-arrow-down-line"></i>
            </button>

        </div>


        <!-- STACK -->

        <div class="stack">

            <div class="card">

                <img class="avatar" src="https://images.unsplash.com/photo-1613366211183-a729adcfc224?q=80&w=764&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="User">

                <h2>Amisha Rathod</h2>

                <div class="info">
                    <span>Surat</span>
                    <span>Booking</span>
                </div>

                <div class="buttons">
                    <button class="call">Call</button>
                    <button class="msg">Message</button>
                </div>

            </div>

        </div>


        <!-- PRIORITY COLORS -->

        <div class="right-colors">

            <span class="dot black"></span>
            <span class="dot purple"></span>
            <span class="dot orange"></span>
            <span class="dot teal"></span>

        </div>

    </div>

    <script src="script.js"></script>

</body>


</html>
